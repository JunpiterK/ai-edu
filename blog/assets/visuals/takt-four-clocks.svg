<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 675">
  <title id="title">Four clocks in a takt-aware agent event</title><desc id="desc">Detection, advisory, approval, and recovery occupy different time intervals and have different owners.</desc>
  <style>
    .bg{fill:#faf9f5}.panel{fill:#fff;stroke:#dbd5c8;stroke-width:2}.axis{stroke:#77716a;stroke-width:3}.tick{stroke:#77716a;stroke-width:2}.seg1{fill:#dcefed}.seg2{fill:#f6eae1}.seg3{fill:#eee7f5}.seg4{fill:#e8edf4}.title{fill:#1f1e1c;font:700 36px Inter,Arial,sans-serif}.sub{fill:#5f5b55;font:500 18px Inter,Arial,sans-serif}.label{fill:#1f1e1c;font:800 17px Inter,Arial,sans-serif}.detail{fill:#5f5b55;font:500 14px Inter,Arial,sans-serif}.time{fill:#1f1e1c;font:800 14px Inter,Arial,sans-serif}
    @media(prefers-color-scheme:dark){.bg{fill:#07111f}.panel{fill:#101d31;stroke:#344a68}.axis,.tick{stroke:#9eb0c7}.seg1{fill:#12373d}.seg2{fill:#392335}.seg3{fill:#302843}.seg4{fill:#1b2a42}.title,.label,.time{fill:#f2f7ff}.sub,.detail{fill:#c7d4e7}}
  </style>
  <rect class="bg" width="1200" height="675"/><rect class="panel" x="42" y="42" width="1116" height="591" rx="28"/>
  <text class="title" x="82" y="106">Four clocks, four owners</text><text class="sub" x="82" y="142">Do not assign the whole stop duration to the agent just because its response appears in the same event record.</text>
  <line class="axis" x1="112" y1="470" x2="1088" y2="470"/>
  <rect class="seg1" x="112" y="238" width="190" height="172" rx="18"/><rect class="seg2" x="302" y="238" width="230" height="172" rx="18"/><rect class="seg3" x="532" y="238" width="280" height="172" rx="18"/><rect class="seg4" x="812" y="238" width="276" height="172" rx="18"/>
  <text class="time" x="207" y="274" text-anchor="middle">T0 - T1</text><text class="label" x="207" y="310" text-anchor="middle">Detect + request</text><text class="detail" x="207" y="340" text-anchor="middle"><tspan x="207">operator / MES /</tspan><tspan x="207" dy="20">Andon owner</tspan></text>
  <text class="time" x="417" y="274" text-anchor="middle">T1 - T2</text><text class="label" x="417" y="310" text-anchor="middle">Advisory wait</text><text class="detail" x="417" y="340" text-anchor="middle"><tspan x="417">AI service</tspan><tspan x="417" dy="20">measured latency</tspan></text>
  <text class="time" x="672" y="274" text-anchor="middle">T2 - T3</text><text class="label" x="672" y="310" text-anchor="middle">Review + approve</text><text class="detail" x="672" y="340" text-anchor="middle"><tspan x="672">line / quality /</tspan><tspan x="672" dy="20">safety owner</tspan></text>
  <text class="time" x="950" y="274" text-anchor="middle">T3 - T4</text><text class="label" x="950" y="310" text-anchor="middle">Repair + recover</text><text class="detail" x="950" y="340" text-anchor="middle"><tspan x="950">maintenance +</tspan><tspan x="950" dy="20">controlled restart</tspan></text>
  <line class="tick" x1="112" y1="450" x2="112" y2="490"/><line class="tick" x1="302" y1="450" x2="302" y2="490"/><line class="tick" x1="532" y1="450" x2="532" y2="490"/><line class="tick" x1="812" y1="450" x2="812" y2="490"/><line class="tick" x1="1088" y1="450" x2="1088" y2="490"/>
  <text class="time" x="112" y="520" text-anchor="middle">T0</text><text class="time" x="302" y="520" text-anchor="middle">T1</text><text class="time" x="532" y="520" text-anchor="middle">T2</text><text class="time" x="812" y="520" text-anchor="middle">T3</text><text class="time" x="1088" y="520" text-anchor="middle">T4</text>
  <text class="sub" x="82" y="580">Agent-attributable delay starts only when production actually waits for a usable advisory response.</text><text class="sub" x="82" y="608">Buffers, parallel work, detection lag, approval, inspection, repair, and restart remain separate terms.</text>
</svg>
