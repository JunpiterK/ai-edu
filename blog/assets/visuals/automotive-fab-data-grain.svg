<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 675">
  <title id="title">Automotive and FAB data grain comparison</title>
  <desc id="desc">Automotive evidence follows a VIN through stations while FAB evidence follows wafers through recipe steps and chambers.</desc>
  <style>
    .bg{fill:#faf9f5}.panel{fill:#fff;stroke:#dbd5c8;stroke-width:2}.lane{fill:#f3f0e8}.card{fill:#fcfbf8;stroke-width:2}.auto{stroke:#168f91}.fab{stroke:#c85f42}.line{stroke:#77716a;stroke-width:3;fill:none}.dot-auto{fill:#168f91}.dot-fab{fill:#c85f42}.title{fill:#1f1e1c;font:700 36px Inter,Arial,sans-serif}.sub{fill:#5f5b55;font:500 18px Inter,Arial,sans-serif}.label{fill:#1f1e1c;font:700 18px Inter,Arial,sans-serif}.detail{fill:#5f5b55;font:500 14px Inter,Arial,sans-serif}.lane-title{fill:#1f1e1c;font:800 20px Inter,Arial,sans-serif}.chip{fill:#e5f4f3}.chip2{fill:#f6eae1}.chiptext{fill:#116e70;font:800 13px Inter,Arial,sans-serif}.chiptext2{fill:#a64b30;font:800 13px Inter,Arial,sans-serif}
    @media(prefers-color-scheme:dark){.bg{fill:#07111f}.panel{fill:#101d31;stroke:#344a68}.lane{fill:#0a1627}.card{fill:#0f1d31}.line{stroke:#9eb0c7}.title,.label,.lane-title{fill:#f2f7ff}.sub,.detail{fill:#c7d4e7}.chip{fill:#12373d}.chip2{fill:#392335}.chiptext{fill:#70e0da}.chiptext2{fill:#ffbe9b}}
  </style>
  <rect class="bg" width="1200" height="675"/><rect class="panel" x="42" y="42" width="1116" height="591" rx="28"/>
  <text class="title" x="82" y="106">Same platform, different data grain</text><text class="sub" x="82" y="142">Do not force VIN/station/takt evidence into a wafer/chamber/recipe-shaped contract.</text>
  <rect class="lane" x="82" y="180" width="1036" height="180" rx="22"/><rect class="chip" x="102" y="198" width="152" height="30" rx="15"/><text class="chiptext" x="178" y="218" text-anchor="middle">AUTOMOTIVE FLOW</text>
  <text class="lane-title" x="102" y="265">One VIN moves; stations stay</text><path class="line" d="M344 280 H1044"/>
  <circle class="dot-auto" cx="380" cy="280" r="9"/><circle class="dot-auto" cx="590" cy="280" r="9"/><circle class="dot-auto" cx="800" cy="280" r="9"/><circle class="dot-auto" cx="1010" cy="280" r="9"/>
  <text class="label" x="380" y="315" text-anchor="middle">Body</text><text class="detail" x="380" y="337" text-anchor="middle">weld + fixture</text><text class="label" x="590" y="315" text-anchor="middle">Paint</text><text class="detail" x="590" y="337" text-anchor="middle">color + oven</text><text class="label" x="800" y="315" text-anchor="middle">Assembly</text><text class="detail" x="800" y="337" text-anchor="middle">part + torque</text><text class="label" x="1010" y="315" text-anchor="middle">EOL</text><text class="detail" x="1010" y="337" text-anchor="middle">test + release</text>
  <rect class="lane" x="82" y="382" width="1036" height="180" rx="22"/><rect class="chip2" x="102" y="400" width="116" height="30" rx="15"/><text class="chiptext2" x="160" y="420" text-anchor="middle">FAB ROUTE</text>
  <text class="lane-title" x="102" y="467">Many wafers visit tools and chambers</text><path class="line" d="M344 482 H1044"/>
  <circle class="dot-fab" cx="380" cy="482" r="9"/><circle class="dot-fab" cx="590" cy="482" r="9"/><circle class="dot-fab" cx="800" cy="482" r="9"/><circle class="dot-fab" cx="1010" cy="482" r="9"/>
  <text class="label" x="380" y="517" text-anchor="middle">Lot / wafer</text><text class="detail" x="380" y="539" text-anchor="middle">route context</text><text class="label" x="590" y="517" text-anchor="middle">Chamber</text><text class="detail" x="590" y="539" text-anchor="middle">recipe step</text><text class="label" x="800" y="517" text-anchor="middle">Trace</text><text class="detail" x="800" y="539" text-anchor="middle">sensor shape</text><text class="label" x="1010" y="517" text-anchor="middle">Metrology</text><text class="detail" x="1010" y="539" text-anchor="middle">delayed result</text>
  <text class="sub" x="82" y="602">Design implication: share infrastructure, but keep IDs, clocks, filters, tools, and approval owners domain-specific.</text>
</svg>
